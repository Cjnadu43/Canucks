<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Highlights & Fan Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <h1>Highlights & Gallery</h1>
      <a href="index.html">Back</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Highlight Video</h2>
      <div class="video-wrap">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID" title="YouTube video" frameborder="0" allowfullscreen></iframe>
      </div>
    </section>

    <section>
      <h2>Fan Gallery</h2>
      <div class="gallery">
        <img src="fan1.jpg" alt="Fan 1">
        <img src="fan2.jpg" alt="Fan 2">
        <img src="fan3.jpg" alt="Fan 3">
      </div>
      <p>To add images, drop files into this folder and update src attributes.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Canucks Fan Page</p>
  </footer>
</body>
</html>
